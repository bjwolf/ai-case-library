<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSRC AI Initiatives Repository</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.21.2/reset.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.13/dayjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.21.2/antd.min.js"></script>
  <style>
    :root { --bg-primary: #060d19; --bg-card: #0b1a2e; --bg-input: #070e1a; --border: #0f3460; --text: #e4ecf7; --text-dim: #5a7fa0; --accent: #00e5ff; --accent2: #ffc107; --success: #00e676; --warning: #ffab00; --danger: #ff5252; --glow: rgba(0,229,255,0.15); }
    @keyframes pulse-glow { 0%,100%{box-shadow:0 0 5px var(--glow),0 0 10px rgba(0,229,255,0.05)} 50%{box-shadow:0 0 15px var(--glow),0 0 30px rgba(0,229,255,0.1)} }
    @keyframes scan-line { 0%{transform:translateY(-100%)} 100%{transform:translateY(100%)} }
    @keyframes gradient-shift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes float-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    body { margin:0; background:var(--bg-primary); color:var(--text); font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
      background-image:radial-gradient(circle at 20% 50%,rgba(0,229,255,0.03) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(255,193,7,0.02) 0%,transparent 50%),radial-gradient(rgba(15,52,96,0.4) 1px,transparent 1px);
      background-size:100% 100%,100% 100%,24px 24px; }
    .site-layout { max-width:1400px; margin:0 auto; padding:16px 24px; animation:float-in 0.4s ease; }
    .auth-container { max-width:420px; margin:80px auto; animation:float-in 0.5s ease; }
    .dark-card { background:linear-gradient(135deg,var(--bg-card),rgba(11,26,46,0.8))!important; border:1px solid var(--border)!important; border-radius:10px!important; backdrop-filter:blur(10px); transition:border-color 0.3s,box-shadow 0.3s; }
    .dark-card:hover { border-color:rgba(0,229,255,0.3)!important; box-shadow:0 0 20px rgba(0,229,255,0.05); }
    .dark-card .ant-card-head { background:transparent!important; border-bottom:1px solid rgba(15,52,96,0.6)!important; color:var(--text)!important; }
    .dark-card .ant-card-body { color:var(--text)!important; }
    .section-header { background:linear-gradient(90deg,rgba(0,229,255,0.12),transparent); padding:8px 16px; border-radius:6px; margin-bottom:16px; font-weight:600; font-size:13px; color:var(--accent); display:flex; align-items:center; gap:8px; border-left:3px solid var(--accent); letter-spacing:0.5px; text-transform:uppercase; }
    .stat-card { background:linear-gradient(135deg,var(--bg-card),rgba(6,13,25,0.9)); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; position:relative; overflow:hidden; transition:transform 0.2s,box-shadow 0.3s; animation:pulse-glow 4s ease-in-out infinite; }
    .stat-card:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(0,229,255,0.1); }
    .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
    .stat-value { font-size:26px; font-weight:700; letter-spacing:-0.5px; }
    .stat-label { font-size:11px; color:var(--text-dim); margin-top:4px; text-transform:uppercase; letter-spacing:1px; }
    .initiative-card { background:linear-gradient(135deg,var(--bg-card),rgba(6,13,25,0.8)); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:12px; transition:all 0.3s; position:relative; overflow:hidden; }
    .initiative-card:hover { border-color:var(--accent); box-shadow:0 4px 20px rgba(0,229,255,0.08); transform:translateY(-1px); }
    .initiative-card::after { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(0,229,255,0.3),transparent); opacity:0; transition:opacity 0.3s; }
    .initiative-card:hover::after { opacity:1; }
    .tag-pill { display:inline-block; padding:2px 10px; border-radius:12px; font-size:11px; font-weight:600; margin-right:4px; letter-spacing:0.3px; }
    .quick-filter { display:inline-flex; align-items:center; padding:5px 14px; border-radius:20px; font-size:12px; cursor:pointer; margin:0 3px 4px 0; border:1px solid var(--border); color:var(--text-dim); background:transparent; transition:all 0.25s; font-weight:500; }
    .quick-filter:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,0.06); box-shadow:0 0 10px rgba(0,229,255,0.1); }
    .quick-filter.active { border-color:var(--accent); color:#fff; background:linear-gradient(135deg,rgba(0,229,255,0.2),rgba(0,229,255,0.08)); box-shadow:0 0 12px rgba(0,229,255,0.15); }
    .dark-input { background:var(--bg-input)!important; border:1px solid var(--border)!important; color:var(--text)!important; border-radius:6px!important; transition:border-color 0.3s,box-shadow 0.3s!important; }
    .dark-input:focus,.dark-input:hover { border-color:var(--accent)!important; box-shadow:0 0 8px rgba(0,229,255,0.1)!important; }
    .dark-input::placeholder { color:var(--text-dim)!important; }
    .ant-table { background:var(--bg-card)!important; color:var(--text)!important; border-radius:8px!important; overflow:hidden; }
    .ant-table-thead>tr>th { background:#0a1525!important; color:#00e5ff!important; border-bottom:2px solid var(--border)!important; font-weight:600!important; font-size:12px!important; text-transform:uppercase; letter-spacing:0.5px; }
    .ant-table-filter-trigger { color:#3a6a8a!important; font-size:14px!important; }
    .ant-table-filter-trigger:hover { color:#00e5ff!important; }
    .ant-table-filter-trigger.active { color:#ffc107!important; }
    .ant-table-column-sorter-up.active,.ant-table-column-sorter-down.active { color:#ffc107!important; }
    .ant-table-column-sorter-up,.ant-table-column-sorter-down { color:#1a3a5c!important; }
    .ant-table-column-sort { background:rgba(0,229,255,0.03)!important; }
    .ant-table-tbody>tr>td { border-bottom:1px solid rgba(15,52,96,0.5)!important; color:var(--text)!important; transition:background 0.2s; }
    .ant-table-tbody>tr:hover>td { background:rgba(0,229,255,0.04)!important; }
    .ant-tabs-tab { color:var(--text-dim)!important; font-weight:500; transition:color 0.3s; }
    .ant-tabs-tab:hover { color:var(--accent)!important; }
    .ant-tabs-tab-active .ant-tabs-tab-btn { color:var(--accent)!important; font-weight:600; }
    .ant-tabs-ink-bar { background:linear-gradient(90deg,var(--accent),rgba(0,229,255,0.5))!important; height:3px!important; border-radius:2px; }
    .ant-select-selector,.ant-input,.ant-input-affix-wrapper,.ant-picker { background:var(--bg-input)!important; border-color:var(--border)!important; color:var(--text)!important; border-radius:6px!important; }
    .ant-select-arrow,.ant-select-selection-placeholder { color:var(--text-dim)!important; }
    .ant-form-item-label>label { color:var(--text-dim)!important; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; }
    .ant-modal-content { background:var(--bg-card)!important; color:var(--text)!important; border:1px solid var(--border); border-radius:12px!important; box-shadow:0 8px 40px rgba(0,0,0,0.6)!important; }
    .ant-modal-header { background:transparent!important; border-bottom:1px solid var(--border)!important; }
    .ant-modal-title { color:var(--text)!important; }
    .ant-pagination-item a { color:var(--text)!important; }
    .ant-card-loading-content { background:var(--bg-card)!important; }
    .ant-dropdown-menu { background:#0b1a2e!important; border:1px solid #0f3460!important; border-radius:8px!important; box-shadow:0 4px 20px rgba(0,0,0,0.5)!important; }
    .ant-dropdown-menu-item { color:var(--text)!important; }
    .ant-dropdown-menu-item:hover { background:rgba(0,229,255,0.08)!important; }
    .ant-table-filter-dropdown { background:#0b1a2e!important; border:1px solid #0f3460!important; box-shadow:0 4px 20px rgba(0,0,0,0.6)!important; border-radius:8px!important; }
    .ant-table-filter-dropdown .ant-checkbox-wrapper { color:#c0d8e8!important; }
    .ant-table-filter-dropdown .ant-checkbox-inner { background:#070e1a!important; border-color:#0f3460!important; }
    .ant-table-filter-dropdown .ant-checkbox-checked .ant-checkbox-inner { background:#00bcd4!important; border-color:#00bcd4!important; }
    .ant-table-filter-dropdown .ant-btn-primary { background:#00bcd4!important; border-color:#00bcd4!important; }
    .ant-table-filter-dropdown .ant-btn-link { color:#00e5ff!important; }
    .ant-table-filter-dropdown .ant-dropdown-menu-item-selected { background:rgba(0,188,212,0.15)!important; color:#00e5ff!important; }
    .ant-slider-track { background:var(--accent)!important; }
    .ant-slider-handle::after { border-color:var(--accent)!important; box-shadow:0 0 8px rgba(0,229,255,0.3)!important; }
    .ant-btn-primary { background:linear-gradient(135deg,#00bcd4,#0097a7)!important; border:none!important; box-shadow:0 2px 8px rgba(0,188,212,0.3)!important; }
    .ant-btn-primary:hover { box-shadow:0 4px 15px rgba(0,188,212,0.4)!important; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Layout, Form, Input, Select, Slider, Button, Table, Tag, message, Card, Space, Typography, Tabs, Popconfirm, Tooltip, Row, Col, Badge, Dropdown, Radio } = antd;
const { Header, Content, Footer } = Layout;
const { Title, Text, Link } = Typography;
const { TextArea } = Input;
const { Option } = Select;
const API = window.location.origin;

function getToken(){return localStorage.getItem("token")}
function getUser(){try{return JSON.parse(localStorage.getItem("user"))}catch{return null}}
function authHeaders(){const t=getToken();return t?{Authorization:`Bearer ${t}`,"Content-Type":"application/json"}:{"Content-Type":"application/json"}}
async function apiLogin(l,p){const r=await fetch(`${API}/auth/login`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({login:l,password:p})});if(!r.ok)throw new Error((await r.json()).detail);return r.json()}
async function apiRegister(d){const r=await fetch(`${API}/auth/register`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});if(!r.ok)throw new Error((await r.json()).detail);return r.json()}
async function apiForgotPassword(e){return(await fetch(`${API}/auth/forgot-password`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:e})})).json()}
async function apiResetPassword(t,p){const r=await fetch(`${API}/auth/reset-password`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:t,new_password:p})});if(!r.ok)throw new Error((await r.json()).detail);return r.json()}
async function fetchOptions(){return(await fetch(`${API}/cases/options`)).json()}
async function fetchCases(p={}){const q=new URLSearchParams(p).toString();return(await fetch(`${API}/cases?${q}`,{headers:authHeaders()})).json()}
async function createCase(d){const r=await fetch(`${API}/cases`,{method:"POST",headers:authHeaders(),body:JSON.stringify(d)});if(!r.ok){const err=await r.json();const msg=typeof err.detail==="string"?err.detail:Array.isArray(err.detail)?err.detail.map(e=>e.msg||e.message||JSON.stringify(e)).join("; "):JSON.stringify(err.detail||err);throw new Error(msg)}return r.json()}
async function updateCase(id,d){const r=await fetch(`${API}/cases/${id}`,{method:"PUT",headers:authHeaders(),body:JSON.stringify(d)});if(!r.ok){const err=await r.json();const msg=typeof err.detail==="string"?err.detail:Array.isArray(err.detail)?err.detail.map(e=>e.msg||e.message||JSON.stringify(e)).join("; "):JSON.stringify(err.detail||err);throw new Error(msg)}return r.json()}
async function deleteCaseApi(id){const r=await fetch(`${API}/cases/${id}`,{method:"DELETE",headers:authHeaders()});if(!r.ok)throw new Error((await r.json()).detail);return r.json()}

// --- Auth Pages (dark themed) ---
function LoginPage({onLogin,onSwitch}){
  const[form]=Form.useForm();const[loading,setLoading]=React.useState(false);
  return(<div className="auth-container"><Card className="dark-card" title={<span style={{color:"var(--accent)"}}>🔐 Login to AI Initiatives Repository</span>}>
    <Form form={form} layout="vertical" onFinish={async v=>{setLoading(true);try{onLogin(await apiLogin(v.login,v.password))}catch(e){message.error(e.message)}finally{setLoading(false)}}}>
      <Form.Item name="login" label="Login" rules={[{required:true}]}><Input className="dark-input" placeholder="Your login alias"/></Form.Item>
      <Form.Item name="password" label="Password" rules={[{required:true}]}><Input.Password className="dark-input" placeholder="Password"/></Form.Item>
      <Button type="primary" htmlType="submit" loading={loading} block style={{background:"var(--accent)",borderColor:"var(--accent)"}}>Login</Button>
      <div style={{marginTop:16,textAlign:"center"}}><Link onClick={()=>onSwitch("register")} style={{color:"var(--accent)"}}>Create account</Link><span style={{margin:"0 8px",color:"var(--text-dim)"}}>|</span><Link onClick={()=>onSwitch("forgot")} style={{color:"var(--accent)"}}>Forgot password?</Link></div>
    </Form></Card></div>);
}
function RegisterPage({onLogin,onSwitch}){
  const[form]=Form.useForm();const[loading,setLoading]=React.useState(false);
  return(<div className="auth-container"><Card className="dark-card" title={<span style={{color:"var(--accent)"}}>📝 Create Account</span>}>
    <Form form={form} layout="vertical" onFinish={async v=>{setLoading(true);try{onLogin(await apiRegister(v));message.success("Account created")}catch(e){message.error(e.message)}finally{setLoading(false)}}}>
      <Form.Item name="login" label="Login Alias" rules={[{required:true}]}><Input className="dark-input" placeholder="e.g. jsmith"/></Form.Item>
      <Form.Item name="email" label="Email" rules={[{required:true,type:"email"}]}><Input className="dark-input" placeholder="your@email.com"/></Form.Item>
      <Form.Item name="display_name" label="Display Name" rules={[{required:true}]}><Input className="dark-input" placeholder="John Smith"/></Form.Item>
      <Form.Item name="password" label="Password" rules={[{required:true,min:6}]}><Input.Password className="dark-input" placeholder="Min 6 characters"/></Form.Item>
      <Button type="primary" htmlType="submit" loading={loading} block style={{background:"var(--accent)",borderColor:"var(--accent)"}}>Register</Button>
      <div style={{marginTop:16,textAlign:"center"}}><Link onClick={()=>onSwitch("login")} style={{color:"var(--accent)"}}>Already have an account? Login</Link></div>
    </Form></Card></div>);
}
function ForgotPasswordPage({onSwitch}){
  const[form]=Form.useForm();const[sent,setSent]=React.useState(false);
  return(<div className="auth-container"><Card className="dark-card" title={<span style={{color:"var(--accent)"}}>🔑 Reset Password</span>}>
    {sent?<div><p>Check server console for reset link.</p><Button onClick={()=>onSwitch("reset")} block>I have a token</Button><div style={{marginTop:8,textAlign:"center"}}><Link onClick={()=>onSwitch("login")} style={{color:"var(--accent)"}}>Back to login</Link></div></div>:
    <Form form={form} layout="vertical" onFinish={async v=>{await apiForgotPassword(v.email);setSent(true);message.success("Check server console")}}>
      <Form.Item name="email" label="Email" rules={[{required:true,type:"email"}]}><Input className="dark-input"/></Form.Item>
      <Button type="primary" htmlType="submit" block style={{background:"var(--accent)",borderColor:"var(--accent)"}}>Send Reset Link</Button>
      <div style={{marginTop:16,textAlign:"center"}}><Link onClick={()=>onSwitch("login")} style={{color:"var(--accent)"}}>Back to login</Link></div>
    </Form>}</Card></div>);
}
function ResetPasswordPage({onSwitch}){
  const[form]=Form.useForm();
  return(<div className="auth-container"><Card className="dark-card" title={<span style={{color:"var(--accent)"}}>🔑 Set New Password</span>}>
    <Form form={form} layout="vertical" onFinish={async v=>{try{await apiResetPassword(v.token,v.new_password);message.success("Password reset");onSwitch("login")}catch(e){message.error(e.message)}}}>
      <Form.Item name="token" label="Reset Token" rules={[{required:true}]}><Input className="dark-input"/></Form.Item>
      <Form.Item name="new_password" label="New Password" rules={[{required:true,min:6}]}><Input.Password className="dark-input"/></Form.Item>
      <Button type="primary" htmlType="submit" block style={{background:"var(--accent)",borderColor:"var(--accent)"}}>Reset Password</Button>
      <div style={{marginTop:16,textAlign:"center"}}><Link onClick={()=>onSwitch("login")} style={{color:"var(--accent)"}}>Back to login</Link></div>
    </Form></Card></div>);
}

// --- New Initiative Form (dark, sectioned like screenshot) ---
function CaseForm({options,onSuccess,editingCase,onCancelEdit,currentUser}){
  const[form]=Form.useForm();const[loading,setLoading]=React.useState(false);const isEditing=!!editingCase;
  React.useEffect(()=>{if(editingCase)form.setFieldsValue(editingCase);else form.resetFields()},[editingCase]);
  const save=async(status)=>{
    try{await form.validateFields(["program_team","use_case_title","problem_statement","ai_technique"]);
      const raw=form.getFieldsValue(true);
      // Convert numeric string fields to numbers
      const numFields=["time_saved","yearly_hc_saved","accuracy","cost_reduction","yearly_usd_saved","dev_time_hours"];
      const v={...raw};
      numFields.forEach(f=>{if(v[f]!==undefined&&v[f]!==null&&v[f]!==""){v[f]=parseFloat(v[f])}else{delete v[f]}});
      // Remove empty string fields
      Object.keys(v).forEach(k=>{if(v[k]===""||v[k]===undefined)delete v[k]});
      setLoading(true);
      if(isEditing){await updateCase(editingCase.id,{...v,status:status||v.status||"Developing"})}
      else{await createCase({...v,status:status||v.status||"Developing"})}
      message.success(isEditing?"Updated":"Created");form.resetFields();onSuccess();
    }catch(e){if(e.errorFields)message.error("Fill required fields");else message.error(e.message)}
    finally{setLoading(false)}};
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{fontSize:20,color:"var(--accent)",fontWeight:"bold"}}>🚀 {isEditing?"Edit":"New"} AI Initiative</span>
        {isEditing&&<Button onClick={()=>{form.resetFields();onCancelEdit()}} style={{color:"var(--danger)"}}>✕ Cancel</Button>}
      </div>
      <Form form={form} layout="vertical" initialValues={{scalability_score:5,innovation_score:5,status:"Developing"}}>
        <div className="section-header">ℹ️ BASIC INFORMATION</div>
        <Row gutter={16}>
          <Col span={8}><Form.Item name="use_case_title" label="AI Initiative Name *" rules={[{required:true}]}><Input className="dark-input"/></Form.Item></Col>
          <Col span={8}><Form.Item label="Owner"><Input className="dark-input" value={currentUser?.login} disabled/></Form.Item></Col>
          <Col span={8}><Form.Item name="job_level" label="Job Level"><Select placeholder="Select" allowClear>{(options.job_levels||[]).map(l=><Option key={l} value={l}>{l}</Option>)}</Select></Form.Item></Col>
        </Row>
        <Row gutter={16}>
          <Col span={6}><Form.Item name="program_team" label="Program *" rules={[{required:true}]}><Select placeholder="Select" showSearch>{(options.programs_teams||[]).map(p=><Option key={p} value={p}>{p}</Option>)}</Select></Form.Item></Col>
          <Col span={6}><Form.Item name="ai_technique" label="AI Technique *" rules={[{required:true}]}><Select placeholder="Select" showSearch>{(options.ai_techniques||[]).map(t=><Option key={t} value={t}>{t}</Option>)}</Select></Form.Item></Col>
          <Col span={6}><Form.Item name="platform" label="Platform"><Select placeholder="Select" allowClear>{(options.platforms||[]).map(p=><Option key={p} value={p}>{p}</Option>)}</Select></Form.Item></Col>
          <Col span={6}><Form.Item name="status" label="Status"><Select placeholder="Select">{(options.statuses||[]).map(s=><Option key={s} value={s}>{s}</Option>)}</Select></Form.Item></Col>
        </Row>
        <Row gutter={16}>
          <Col span={8}><Form.Item name="is_chatbot" label="Is Chatbot?"><Radio.Group>{(options.is_chatbot||[]).map(c=><Radio key={c} value={c} style={{color:"var(--text)"}}>{c}</Radio>)}</Radio.Group></Form.Item></Col>
          <Col span={8}><Form.Item name="dev_type" label="Development Type"><Select placeholder="Select" allowClear>{(options.dev_types||[]).map(d=><Option key={d} value={d}>{d}</Option>)}</Select></Form.Item></Col>
          <Col span={8}/>
        </Row>

        <div className="section-header">📋 PROJECT DETAILS</div>
        <Row gutter={16}>
          <Col span={8}><Form.Item name="problem_statement" label="Problem Statement *" rules={[{required:true}]}><TextArea rows={4} className="dark-input" maxLength={1000} showCount/></Form.Item></Col>
          <Col span={8}><Form.Item name="solution_description" label="Proposed Solution"><TextArea rows={4} className="dark-input" maxLength={1000} showCount/></Form.Item></Col>
          <Col span={8}><Form.Item name="output_outcome" label="Impact Expected"><TextArea rows={4} className="dark-input" maxLength={1000} showCount/></Form.Item></Col>
        </Row>
        <Row gutter={16}>
          <Col span={24}><Form.Item name="tools_services" label="Tools / Services"><Input className="dark-input" placeholder="e.g. SageMaker, Bedrock"/></Form.Item></Col>
        </Row>
        <Form.Item name="key_prompts" label="Key Prompts"><TextArea rows={2} className="dark-input"/></Form.Item>

        <div className="section-header">📊 IMPACT & BENEFITS</div>
        <Row gutter={16}>
          <Col span={4}><Form.Item name="time_saved" label="Time Saved %"><Input type="number" className="dark-input" min={0} max={100}/></Form.Item></Col>
          <Col span={4}><Form.Item name="yearly_hc_saved" label="HC Saved/yr"><Input type="number" className="dark-input" min={0}/></Form.Item></Col>
          <Col span={4}><Form.Item name="accuracy" label="Accuracy %"><Input type="number" className="dark-input" min={0} max={100}/></Form.Item></Col>
          <Col span={4}><Form.Item name="cost_reduction" label="Cost Red. %"><Input type="number" className="dark-input" min={0} max={100}/></Form.Item></Col>
          <Col span={4}><Form.Item name="yearly_usd_saved" label="USD Saved/yr"><Input type="number" className="dark-input" min={0}/></Form.Item></Col>
          <Col span={4}><Form.Item name="dev_time_hours" label="Dev Hours"><Input type="number" className="dark-input" min={0}/></Form.Item></Col>
        </Row>
        <Row gutter={16}>
          <Col span={12}><Form.Item name="scalability_score" label="Scalability (1-10)"><Slider min={1} max={10} marks={{1:"1",5:"5",10:"10"}}/></Form.Item></Col>

// --- Dashboard (dark themed) ---
function SimpleBar({label,value,max,color,suffix}){const pct=max>0?(value/max)*100:0;return(<div style={{display:"flex",alignItems:"center",marginBottom:6}}><div style={{width:130,fontSize:11,color:"var(--text-dim)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={label}>{label}</div><div style={{flex:1,background:"var(--bg-primary)",borderRadius:4,height:18}}><div style={{width:`${pct}%`,background:color||"var(--accent)",borderRadius:4,height:18,minWidth:pct>0?2:0,transition:"width 0.3s"}}/></div><div style={{width:60,textAlign:"right",fontSize:11,color:"var(--text)"}}>{suffix?`${value}${suffix}`:value}</div></div>)}
function SimpleDonut({items,colors}){const total=items.reduce((s,i)=>s+i.value,0);let cum=0;const parts=items.map((item,i)=>{const p=total>0?(item.value/total)*100:0;const s=cum;cum+=p;return`${colors[i%colors.length]} ${s}% ${cum}%`});return(<div style={{display:"flex",alignItems:"center",gap:16}}><div style={{width:120,height:120,borderRadius:"50%",background:`conic-gradient(${parts.join(",")})`,position:"relative",flexShrink:0}}><div style={{position:"absolute",top:"28%",left:"28%",width:"44%",height:"44%",borderRadius:"50%",background:"var(--bg-card)"}}/></div><div>{items.map((item,i)=>(<div key={i} style={{display:"flex",alignItems:"center",marginBottom:3,fontSize:11,color:"var(--text-dim)"}}><div style={{width:10,height:10,borderRadius:2,background:colors[i%colors.length],marginRight:6}}/>{item.label}: {item.value}</div>))}</div></div>)}

// --- All Cases Table for Dashboard ---
function AllCasesTable(){
  const[cases,setCases]=React.useState([]);const[options,setOptions]=React.useState({});const[loading,setLoading]=React.useState(true);
  React.useEffect(()=>{(async()=>{try{const[c,o]=await Promise.all([fetchCases(),fetchOptions()]);setCases(c);setOptions(o)}catch(e){}finally{setLoading(false)}})()},[]);
  const uniq=(arr,key)=>[...new Set((arr||[]).map(r=>r[key]).filter(Boolean))].map(v=>({text:v,value:v}));

  // Custom filter dropdown with Select All and high-contrast colors
  const makeFilterDropdown=(filterItems)=>({setSelectedKeys,selectedKeys,confirm,clearFilters})=>{
    const allVals=filterItems.map(f=>f.value);
    const allSelected=allVals.length>0&&allVals.every(v=>selectedKeys.includes(v));
    return(
      <div style={{padding:8,background:"#0a1929",border:"1px solid #1a4a6c",borderRadius:6,minWidth:180}}>
        <div style={{marginBottom:6,borderBottom:"1px solid #1a3a5c",paddingBottom:6}}>
          <label style={{cursor:"pointer",display:"flex",alignItems:"center",gap:6,color:"#00e5ff",fontWeight:"bold",fontSize:13}}>
            <input type="checkbox" checked={allSelected} onChange={e=>{if(e.target.checked)setSelectedKeys(allVals);else setSelectedKeys([])}} style={{accentColor:"#00bcd4"}}/>
            Select All ({allVals.length})
          </label>
        </div>
        <div style={{maxHeight:200,overflowY:"auto"}}>
          {filterItems.map(item=>(
            <label key={item.value} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",cursor:"pointer",color:selectedKeys.includes(item.value)?"#ffffff":"#a0c0d8",fontSize:13}}>
              <input type="checkbox" checked={selectedKeys.includes(item.value)} onChange={e=>{if(e.target.checked)setSelectedKeys([...selectedKeys,item.value]);else setSelectedKeys(selectedKeys.filter(k=>k!==item.value))}} style={{accentColor:"#00bcd4"}}/>
              {item.text}
            </label>
          ))}
        </div>
        <div style={{marginTop:8,display:"flex",gap:6,borderTop:"1px solid #1a3a5c",paddingTop:8}}>
          <button onClick={()=>{confirm()}} style={{flex:1,padding:"4px 0",background:"#00bcd4",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontSize:12,fontWeight:"bold"}}>OK</button>
          <button onClick={()=>{clearFilters();confirm()}} style={{flex:1,padding:"4px 0",background:"transparent",color:"#ff6b6b",border:"1px solid #ff6b6b",borderRadius:4,cursor:"pointer",fontSize:12}}>Reset</button>
        </div>
      </div>
    );
  };

  const mkFilter=(items)=>({filterDropdown:makeFilterDropdown(items),onFilter:(v,r)=>items.some(i=>i.value===v)?(r[items[0]?.field]||"")=== v:true});
  const cols=[
    {title:"Title",dataIndex:"use_case_title",key:"t",width:160,sorter:(a,b)=>(a.use_case_title||"").localeCompare(b.use_case_title||"")},
    {title:"Owner",dataIndex:"owner_login",key:"o",width:80,filterDropdown:makeFilterDropdown(uniq(cases,"owner_login")),onFilter:(v,r)=>r.owner_login===v},
    {title:"Program",dataIndex:"program_team",key:"p",width:130,filterDropdown:makeFilterDropdown((options.programs_teams||[]).map(p=>({text:p,value:p}))),onFilter:(v,r)=>r.program_team===v},
    {title:"Technique",dataIndex:"ai_technique",key:"ai",width:130,filterDropdown:makeFilterDropdown((options.ai_techniques||[]).map(t=>({text:t,value:t}))),onFilter:(v,r)=>r.ai_technique===v},
    {title:"Platform",dataIndex:"platform",key:"pl",width:90,filterDropdown:makeFilterDropdown((options.platforms||[]).map(p=>({text:p,value:p}))),onFilter:(v,r)=>r.platform===v},
    {title:"Dev Type",dataIndex:"dev_type",key:"dt",width:85,filterDropdown:makeFilterDropdown((options.dev_types||[]).map(d=>({text:d,value:d}))),onFilter:(v,r)=>r.dev_type===v},
    {title:"Chatbot",dataIndex:"is_chatbot",key:"cb",width:70,filterDropdown:makeFilterDropdown((options.is_chatbot||[]).map(c=>({text:c,value:c}))),onFilter:(v,r)=>r.is_chatbot===v},
    {title:"Status",dataIndex:"status",key:"s",width:100,filterDropdown:makeFilterDropdown((options.statuses||[]).map(s=>({text:s,value:s}))),onFilter:(v,r)=>r.status===v,render:s=><span className="tag-pill" style={{background:{"Developing":"var(--accent)","UAT":"var(--warning)","In Production":"var(--success)"}[s]||"#999",color:"#fff"}}>{s}</span>},
    {title:"Time%",dataIndex:"time_saved",key:"ts",width:65,sorter:(a,b)=>(a.time_saved||0)-(b.time_saved||0),render:v=>v!=null?`${v}%`:"-"},
    {title:"HC/yr",dataIndex:"yearly_hc_saved",key:"hc",width:60,sorter:(a,b)=>(a.yearly_hc_saved||0)-(b.yearly_hc_saved||0),render:v=>v!=null?v.toFixed(1):"-"},
    {title:"Acc%",dataIndex:"accuracy",key:"ac",width:55,sorter:(a,b)=>(a.accuracy||0)-(b.accuracy||0),render:v=>v!=null?`${v}%`:"-"},
    {title:"Cost%",dataIndex:"cost_reduction",key:"cr",width:60,sorter:(a,b)=>(a.cost_reduction||0)-(b.cost_reduction||0),render:v=>v!=null?`${v}%`:"-"},
    {title:"USD/yr",dataIndex:"yearly_usd_saved",key:"usd",width:90,sorter:(a,b)=>(a.yearly_usd_saved||0)-(b.yearly_usd_saved||0),render:v=>v!=null?`$${v.toLocaleString()}`:"-"},

  ];
  return <Table columns={cols} dataSource={cases} rowKey="id" loading={loading} size="small" scroll={{x:1500}} pagination={{pageSize:10,showSizeChanger:true,pageSizeOptions:["10","25","50"],showTotal:(t,range)=>`${range[0]}-${range[1]} of ${t}`}}/>;

    </Row>
    <Row gutter={[12,12]}>
      <Col span={12}><div className="dark-card" style={{padding:16,borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)"}}><div style={{color:"var(--accent)",fontWeight:"bold",marginBottom:12}}>📊 Platform Distribution</div>{byPlatform.length>0?byPlatform.map((r,i)=><SimpleBar key={i} label={r.platform} value={r.count} max={Math.max(...byPlatform.map(x=>x.count),1)} color={COLORS[i%10]}/>):<div style={{color:"var(--text-dim)"}}>No data</div>}</div></Col>
      <Col span={12}><div className="dark-card" style={{padding:16,borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)"}}><div style={{color:"var(--accent)",fontWeight:"bold",marginBottom:12}}>📈 Status Distribution</div>{byStatus.map((r,i)=><SimpleBar key={i} label={r.status} value={r.count} max={Math.max(...byStatus.map(x=>x.count),1)} color={scm[r.status]||"#999"}/>)}</div></Col>
    </Row>
    <Row gutter={[12,12]} style={{marginTop:12}}>
      <Col span={8}><div className="dark-card" style={{padding:16,borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)"}}><div style={{color:"var(--accent)",fontWeight:"bold",marginBottom:12}}>🔧 AI Technique</div><SimpleDonut items={byTechnique.map(r=>({label:r.technique,value:r.count}))} colors={COLORS}/></div></Col>
      <Col span={8}><div className="dark-card" style={{padding:16,borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)"}}><div style={{color:"var(--accent)",fontWeight:"bold",marginBottom:12}}>💻 Development Type</div>{byDevType.length>0?<SimpleDonut items={byDevType.map(r=>({label:r.dev_type,value:r.count}))} colors={byDevType.map(r=>dtc[r.dev_type]||"#999")}/>:<div style={{color:"var(--text-dim)"}}>No data</div>}</div></Col>
      <Col span={8}><div className="dark-card" style={{padding:16,borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)"}}><div style={{color:"var(--accent)",fontWeight:"bold",marginBottom:12}}>🤖 Chatbot Analysis</div>{byChatbot.length>0?<SimpleDonut items={byChatbot.map(r=>({label:r.is_chatbot==="Yes"?"Chatbot":"Not Chatbot",value:r.count}))} colors={byChatbot.map(r=>cbc[r.is_chatbot]||"#999")}/>:<div style={{color:"var(--text-dim)"}}>No data</div>}</div></Col>
    </Row>
    <Row gutter={[12,12]} style={{marginTop:12}}>
      <Col span={12}><div className="dark-card" style={{padding:16,borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)"}}><div style={{color:"var(--accent)",fontWeight:"bold",marginBottom:12}}>💰 USD Saved by Program</div>{[...byProgram].sort((a,b)=>b.total_usd_saved-a.total_usd_saved).map((r,i)=><SimpleBar key={i} label={r.program} value={r.total_usd_saved} max={maxUsd} color="var(--accent2)"/>)}</div></Col>
      <Col span={12}><div className="dark-card" style={{padding:16,borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)"}}><div style={{color:"var(--accent)",fontWeight:"bold",marginBottom:12}}>📅 Submissions Timeline</div><div style={{display:"flex",alignItems:"flex-end",height:120,gap:4}}>{trends.map((r,i)=>(<div key={i} style={{flex:1,textAlign:"center"}}><div style={{background:"var(--accent)",borderRadius:"3px 3px 0 0",height:`${maxTrend>0?(r.count/maxTrend)*100:0}px`,minHeight:r.count>0?4:0}}/><div style={{fontSize:9,color:"var(--text-dim)",marginTop:4}}>{r.month}</div></div>))}</div></div></Col>
    </Row>
    <div style={{marginTop:16}}>
      <div className="dark-card" style={{padding:16,borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)"}}>
        <div style={{color:"var(--accent)",fontWeight:"bold",marginBottom:12}}>📋 All Solutions Data</div>
        <AllCasesTable />
      </div>
    </div>
  </div>);
}

// --- Leaderboard (dark) ---
function Leaderboard(){
  const[rankings,setRankings]=React.useState([]);const[loading,setLoading]=React.useState(true);
  const[weights,setWeights]=React.useState({impact:40,scalability:25,effort:20,innovation:15});
  const[analysisModal,setAnalysisModal]=React.useState(null);const[aLoading,setALoading]=React.useState(false);
  const{Modal:AntModal}=antd;
  const load=async w=>{setLoading(true);try{const q=`impact_w=${w.impact}&scalability_w=${w.scalability}&effort_w=${w.effort}&innovation_w=${w.innovation}`;setRankings(await fetch(`${API}/rankings?${q}`).then(r=>r.json()))}catch(e){message.error("Failed")}finally{setLoading(false)}};
  React.useEffect(()=>{load(weights)},[]);
  const analyze=async r=>{setALoading(true);setAnalysisModal({title:r.use_case_title,data:null});try{setAnalysisModal({title:r.use_case_title,data:await fetch(`${API}/rankings/${r.id}/ai-analysis`,{method:"POST",headers:authHeaders()}).then(r=>r.json())})}catch(e){message.error("Failed");setAnalysisModal(null)}finally{setALoading(false)}};
  const medalColors={1:"#FFD700",2:"#C0C0C0",3:"#CD7F32"};const total=weights.impact+weights.scalability+weights.effort+weights.innovation;const ok=total===100;
  const cols=[
    {title:"#",dataIndex:"rank",key:"r",width:50,render:v=><span style={{fontWeight:"bold",fontSize:16,color:medalColors[v]||"var(--text)"}}>{medalColors[v]?"🏆":""}{v}</span>},
    {title:"Title",dataIndex:"use_case_title",key:"t",width:180},{title:"Owner",dataIndex:"owner_login",key:"o",width:80},
    {title:"Score",dataIndex:"composite_score",key:"cs",width:70,render:v=><span style={{fontWeight:"bold",color:v>=70?"var(--success)":v>=40?"var(--warning)":"var(--danger)"}}>{v}</span>},
    {title:"Impact",dataIndex:"impact_score",key:"is",width:60},{title:"Scale",dataIndex:"scalability_score_calc",key:"sc",width:60},
    {title:"Effort",dataIndex:"effort_score",key:"ef",width:60},{title:"Innov",dataIndex:"innovation_score_calc",key:"in",width:60},
    {title:"",key:"ai",width:100,render:(_,r)=><Button size="small" onClick={()=>analyze(r)} style={{color:"var(--accent)",borderColor:"var(--border)"}}>AI Analysis</Button>},
  ];
  const Sec=({title,items,color})=>(<div style={{marginBottom:12}}><div style={{fontWeight:"bold",color,marginBottom:4}}>{title}</div>{items&&items.map((item,i)=><div key={i} style={{paddingLeft:12,marginBottom:2,color:"var(--text)"}}>• {item}</div>)}</div>);
  return(<div>
    <div className="dark-card" style={{padding:16,marginBottom:16,borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)"}}>
      <div style={{color:"var(--accent)",fontWeight:"bold",marginBottom:12}}>⚖️ Adjust Weights</div>
      <Row gutter={24}>
        <Col span={5}><div style={{color:"var(--text-dim)",fontSize:12}}>Impact ({weights.impact}%)</div><Slider min={0} max={100} value={weights.impact} onChange={v=>setWeights(p=>({...p,impact:v}))}/></Col>
        <Col span={5}><div style={{color:"var(--text-dim)",fontSize:12}}>Scalability ({weights.scalability}%)</div><Slider min={0} max={100} value={weights.scalability} onChange={v=>setWeights(p=>({...p,scalability:v}))}/></Col>
        <Col span={5}><div style={{color:"var(--text-dim)",fontSize:12}}>Effort ({weights.effort}%)</div><Slider min={0} max={100} value={weights.effort} onChange={v=>setWeights(p=>({...p,effort:v}))}/></Col>
        <Col span={5}><div style={{color:"var(--text-dim)",fontSize:12}}>Innovation ({weights.innovation}%)</div><Slider min={0} max={100} value={weights.innovation} onChange={v=>setWeights(p=>({...p,innovation:v}))}/></Col>
        <Col span={4} style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:"bold",color:ok?"var(--success)":"var(--danger)"}}>{total}%</div><div style={{fontSize:11,color:ok?"var(--success)":"var(--danger)"}}>{ok?"✓ Balanced":"Must = 100%"}</div><Button size="small" onClick={()=>load(weights)} disabled={!ok} style={{marginTop:6,background:"var(--accent)",borderColor:"var(--accent)",color:"#fff"}}>Refresh</Button></Col>
      </Row>
    </div>
    <Table columns={cols} dataSource={rankings} rowKey="id" loading={loading} size="small" pagination={{pageSize:20}}/>
    <AntModal title={analysisModal?.title} open={!!analysisModal} onCancel={()=>setAnalysisModal(null)} footer={null} width={600}>
      {aLoading?<Card loading className="dark-card"/>:analysisModal?.data&&<div style={{background:"var(--bg-card)",padding:12,borderRadius:8}}><div style={{background:"rgba(0,188,212,0.1)",padding:12,borderRadius:8,marginBottom:12,color:"var(--accent)"}}><b>{analysisModal.data.summary}</b></div><Sec title="💪 Strengths" items={analysisModal.data.strengths} color="var(--success)"/><Sec title="⚠️ Weaknesses" items={analysisModal.data.weaknesses} color="var(--warning)"/><Sec title="💡 Suggestions" items={analysisModal.data.suggestions} color="var(--accent)"/><Sec title="🔴 Risks" items={analysisModal.data.risks} color="var(--danger)"/></div>}
    </AntModal>
  </div>);
}

// --- AI Agent (dark chat) ---
function AIAgent(){
  const[msgs,setMsgs]=React.useState([]);const[input,setInput]=React.useState("");const[sid,setSid]=React.useState(null);const[loading,setLoading]=React.useState(false);
  const send=async()=>{if(!input.trim())return;const q=input.trim();setInput("");setMsgs(p=>[...p,{role:"user",content:q}]);setLoading(true);
    try{let r;if(!sid){r=await fetch(`${API}/agent/design`,{method:"POST",headers:authHeaders(),body:JSON.stringify({query:q})}).then(r=>r.json());setSid(r.session_id);setMsgs(p=>[...p,{role:"agent",design:r.design}])}
    else{r=await fetch(`${API}/agent/followup`,{method:"POST",headers:authHeaders(),body:JSON.stringify({session_id:sid,question:q})}).then(r=>r.json());setMsgs(p=>[...p,{role:"agent",text:r.answer||r.error,design:r.updated_design}])}}
    catch(e){setMsgs(p=>[...p,{role:"agent",text:"Error: "+e.message}])}finally{setLoading(false)}};
  const Design=({d})=>{if(!d)return null;return(<div style={{background:"rgba(0,188,212,0.08)",borderRadius:8,padding:12,marginTop:8,border:"1px solid var(--border)"}}>
    <div style={{marginBottom:8,color:"var(--text)"}}>{d.recommendation}</div>
    {d.technique&&<div style={{marginBottom:6}}><b style={{color:"var(--accent)"}}>Technique:</b> <span className="tag-pill" style={{background:"rgba(0,188,212,0.2)",color:"var(--accent)"}}>{d.technique}</span></div>}
    {d.tools&&d.tools.length>0&&<div style={{marginBottom:6}}><b style={{color:"var(--accent)"}}>Tools:</b> {d.tools.map((t,i)=><span key={i} className="tag-pill" style={{background:"var(--bg-primary)",color:"var(--text-dim)"}}>{t}</span>)}</div>}
    {d.estimated_effort_hours&&<div style={{marginBottom:6,color:"var(--text-dim)"}}>⏱ Estimated: ~{d.estimated_effort_hours}h</div>}
    {d.implementation_steps&&d.implementation_steps.length>0&&<div style={{marginBottom:6}}><b style={{color:"var(--accent)"}}>Steps:</b><ol style={{margin:"4px 0",paddingLeft:20,color:"var(--text-dim)"}}>{d.implementation_steps.map((s,i)=><li key={i} style={{fontSize:12}}>{s.replace(/^\d+\.\s*/,"")}</li>)}</ol></div>}
    {d.matched_cases&&d.matched_cases.length>0&&<div><b style={{color:"var(--accent)"}}>References:</b>{d.matched_cases.map((c,i)=>(<div key={i} style={{background:"var(--bg-primary)",borderRadius:4,padding:6,marginTop:4,fontSize:12,color:"var(--text-dim)"}}><b style={{color:"var(--text)"}}>{c.title}</b> — {c.technique} {c.yearly_usd_saved?`($${c.yearly_usd_saved.toLocaleString()}/yr)`:""}</div>))}</div>}
  </div>)};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><span style={{color:"var(--accent)",fontWeight:"bold",fontSize:16}}>🤖 AI Solution Design Agent</span><Button size="small" onClick={()=>{setMsgs([]);setSid(null)}} style={{color:"var(--accent)",borderColor:"var(--border)"}}>New Chat</Button></div>
    <div style={{minHeight:400,maxHeight:500,overflowY:"auto",marginBottom:12,padding:8}}>
      {msgs.length===0&&<div style={{textAlign:"center",color:"var(--text-dim)",padding:60}}><div style={{fontSize:40,marginBottom:12}}>🤖</div><div>Describe your problem and I'll design an AI solution.</div><div style={{fontSize:12,marginTop:8,color:"var(--border)"}}>Example: "We need to automate invoice processing"</div></div>}
      {msgs.map((m,i)=>(<div key={i} style={{marginBottom:10,display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}><div style={{maxWidth:"85%",padding:10,borderRadius:10,background:m.role==="user"?"var(--accent)":"var(--bg-card)",color:m.role==="user"?"#fff":"var(--text)",border:m.role==="agent"?"1px solid var(--border)":"none"}}>{m.content&&<div>{m.content}</div>}{m.text&&<div>{m.text}</div>}{m.design&&<Design d={m.design}/>}</div></div>))}
      {loading&&<div style={{textAlign:"center",color:"var(--accent)",padding:12}}>Analyzing...</div>}
    </div>
    <div style={{display:"flex",gap:8}}><Input.TextArea value={input} onChange={e=>setInput(e.target.value)} className="dark-input" placeholder="Describe your problem..." autoSize={{minRows:1,maxRows:3}} onPressEnter={e=>{if(!e.shiftKey){e.preventDefault();send()}}}/><Button onClick={send} loading={loading} style={{background:"var(--accent)",borderColor:"var(--accent)",color:"#fff",height:"auto"}}>Send</Button></div>
  </div>);
}

// --- User Management (Admin) ---
function UserManagement({open,onClose}){
  const[users,setUsers]=React.useState([]);const[loading,setLoading]=React.useState(true);
  const[showAdd,setShowAdd]=React.useState(false);const[addForm]=Form.useForm();
  const{Modal:AntModal}=antd;
  const load=async()=>{setLoading(true);try{setUsers(await fetch(`${API}/admin/users`,{headers:authHeaders()}).then(r=>r.json()))}catch(e){message.error("Failed")}finally{setLoading(false)}};
  React.useEffect(()=>{if(open)load()},[open]);
  const changeRole=async(id,role)=>{try{await fetch(`${API}/admin/users/${id}/role`,{method:"PUT",headers:authHeaders(),body:JSON.stringify({role})});message.success("Role updated");load()}catch(e){message.error("Failed")}};
  const delUser=async id=>{try{await fetch(`${API}/admin/users/${id}`,{method:"DELETE",headers:authHeaders()});message.success("Deleted");load()}catch(e){message.error(e.message)}};
  const addUser=async v=>{try{await fetch(`${API}/admin/users`,{method:"POST",headers:authHeaders(),body:JSON.stringify(v)});message.success("User created");addForm.resetFields();setShowAdd(false);load()}catch(e){message.error("Failed")}};
  const cols=[
    {title:"Login",dataIndex:"login",key:"l",width:100},
    {title:"Name",dataIndex:"display_name",key:"n",width:120},
    {title:"Email",dataIndex:"email",key:"e",width:160},
    {title:"Role",dataIndex:"role",key:"r",width:100,render:(role,r)=><Select value={role} size="small" style={{width:100}} onChange={v=>changeRole(r.id,v)}><Option value="learner">learner</Option><Option value="admin">admin</Option></Select>},
    {title:"",key:"a",width:60,render:(_,r)=>r.login!=="admin"&&<Popconfirm title="Delete user?" onConfirm={()=>delUser(r.id)}><Button size="small" danger>Del</Button></Popconfirm>},
  ];
  return(
    <AntModal title={<span style={{color:"var(--accent)"}}>👥 User Management</span>} open={open} onCancel={onClose} footer={null} width={700} styles={{content:{background:"var(--bg-card)",border:"1px solid var(--border)"}}}>
      <div style={{marginBottom:12}}><Button size="small" onClick={()=>setShowAdd(!showAdd)} style={{background:"var(--accent)",borderColor:"var(--accent)",color:"#fff"}}>+ Add User</Button></div>
      {showAdd&&<div style={{background:"var(--bg-primary)",padding:12,borderRadius:6,marginBottom:12,border:"1px solid var(--border)"}}>
        <Form form={addForm} layout="inline" onFinish={addUser}>
          <Form.Item name="login" rules={[{required:true}]}><Input className="dark-input" placeholder="Login" size="small"/></Form.Item>
          <Form.Item name="display_name" rules={[{required:true}]}><Input className="dark-input" placeholder="Name" size="small"/></Form.Item>
          <Form.Item name="email"><Input className="dark-input" placeholder="Email" size="small"/></Form.Item>
          <Form.Item name="password" rules={[{required:true}]}><Input.Password className="dark-input" placeholder="Password" size="small"/></Form.Item>
          <Form.Item name="role" initialValue="learner"><Select size="small" style={{width:90}}><Option value="learner">learner</Option><Option value="admin">admin</Option></Select></Form.Item>
          <Button htmlType="submit" size="small" style={{background:"var(--accent)",borderColor:"var(--accent)",color:"#fff"}}>Create</Button>
        </Form>
      </div>}
      <Table columns={cols} dataSource={users} rowKey="id" loading={loading} size="small" pagination={false}/>
    </AntModal>);
}

// --- Main App ---
function App(){
  const[currentUser,setCurrentUser]=React.useState(getUser());const[authPage,setAuthPage]=React.useState("login");
  const[options,setOptions]=React.useState({});const[cases,setCases]=React.useState([]);const[loading,setLoading]=React.useState(false);
  const[activeTab,setActiveTab]=React.useState("list");
  const[showUserMgmt,setShowUserMgmt]=React.useState(false);
  const handleLogin=r=>{localStorage.setItem("token",r.access_token);localStorage.setItem("user",JSON.stringify(r.user));setCurrentUser(r.user);setActiveTab("list")};
  const handleLogout=()=>{localStorage.removeItem("token");localStorage.removeItem("user");setCurrentUser(null);setAuthPage("login");setCases([]);setOptions({});};
  const loadData=async()=>{setLoading(true);try{const[o,d]=await Promise.all([fetchOptions(),fetchCases()]);setOptions(o);setCases(d)}catch(e){message.error("Failed to load")}finally{setLoading(false)}};
  React.useEffect(()=>{if(currentUser)loadData()},[currentUser]);
  if(!currentUser){
    if(authPage==="register")return<div key="register"><RegisterPage onLogin={handleLogin} onSwitch={setAuthPage}/></div>;
    if(authPage==="forgot")return<div key="forgot"><ForgotPasswordPage onSwitch={setAuthPage}/></div>;
    if(authPage==="reset")return<div key="reset"><ResetPasswordPage onSwitch={setAuthPage}/></div>;
    return<div key="login"><LoginPage onLogin={handleLogin} onSwitch={setAuthPage}/></div>;
  }
  const isAdmin=currentUser.role==="admin";
  const tabs=[
    {key:"list",label:`📋 Browse (${cases.length})`,children:<CaseList cases={cases} loading={loading} options={options} currentUser={currentUser} onRefresh={loadData}/>},
    {key:"mine",label:"👤 My Initiatives",children:<CaseList cases={cases.filter(c=>c.owner_login===currentUser.login)} loading={loading} options={options} currentUser={currentUser} onRefresh={loadData}/>},
    {key:"dashboard",label:"📊 Dashboard",children:<Dashboard/>},
    {key:"agent",label:"🤖 AI Agent",children:<AIAgent/>},
    {key:"leaderboard",label:"🏆 Leaderboard",children:<Leaderboard/>},
  ];
  if(!isAdmin)tabs.splice(tabs.findIndex(t=>t.key==="leaderboard"),1);
  const userMenu=[{key:"role",label:`Role: ${currentUser.role}`,disabled:true},...(isAdmin?[{key:"users",label:"👥 Manage Users"}]:[]),{key:"logout",label:"Logout",danger:true}];
  return(
    <Layout style={{minHeight:"100vh",background:"var(--bg-primary)"}}>
      <div style={{background:"linear-gradient(135deg,#0d2137,#0a1929)",padding:"16px 24px",borderBottom:"1px solid var(--border)"}}>
        <div style={{maxWidth:1400,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:22,fontWeight:"bold",color:"var(--accent)"}}>🚀 GSRC AI Initiatives Repository</div><div style={{fontSize:12,color:"var(--text-dim)"}}>Track, manage, and analyze AI-powered solutions across your organization</div></div>
          <Dropdown menu={{items:userMenu,onClick:({key})=>{if(key==="logout")handleLogout();if(key==="users")setShowUserMgmt(true)}}}>
            <Button type="text" style={{color:"var(--text)"}}>👤 {currentUser.display_name} {isAdmin&&<span style={{background:"var(--accent2)",color:"#000",padding:"1px 8px",borderRadius:10,fontSize:11,marginLeft:4}}>ADMIN</span>}</Button>
          </Dropdown>
        </div>
      </div>
      <Content className="site-layout"><Tabs activeKey={activeTab} onChange={setActiveTab} items={tabs} size="large"/></Content>
      <Footer style={{textAlign:"center",background:"var(--bg-primary)",color:"var(--text-dim)",borderTop:"1px solid var(--border)"}}>AI Ascent Hackathon 2026</Footer>
      {isAdmin&&<UserManagement open={showUserMgmt} onClose={()=>setShowUserMgmt(false)}/>}
    </Layout>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
